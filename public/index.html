      <div className="card panel-pad">
        <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>By campaign</div>
        <div style={{display:'grid',gap:12}}>
          {byCamp.map(({c,n})=><div key={c.id} style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{display:'flex',alignItems:'center',gap:7,flex:1,minWidth:0,fontSize:12.5}}><Dot color={c.color}/><span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name.replace(/ —.*$/,'')}</span></span>
            <div style={{width:64}}><MeterBar value={n} max={campMax} color={c.color} h={6}/></div>
            <span className="tnum faint" style={{fontSize:12,width:18,textAlign:'right'}}>{n}</span>
          </div>)}
        </div>
      </div>
    </div>
  </div></div>;
}
function TeamScreen({threads,onGoInbox}){
  const s=liveStats(threads);
  const handlers=Object.values(DB.HANDLERS).filter(h=>h.role==='handler');
  function load(hid){const t=threads.filter(x=>x.assignee===hid);return {total:t.length,neu:t.filter(x=>x.unread&&!x.done).length,interested:t.filter(x=>x.intent==='interested').length,meetings:t.filter(x=>x.intent==='meeting').length,ooo:t.filter(x=>x.intent==='ooo').length};}
  const maxLoad=Math.max(...handlers.map(h=>load(h.id).total),1);
  const A=DB.ANALYTICS,slaTotal=A.sla.ontime+A.sla.risk+A.sla.breach,slaPct=Math.round(A.sla.ontime/slaTotal*100);
  const byCamp=Object.values(DB.CAMPAIGNS).map(c=>({c,n:threads.filter(t=>t.campaign===c.id).length}));
  const campMax=Math.max(...byCamp.map(x=>x.n),1);
  return <div className="content"><div className="page" style={{maxWidth:1180}}>
    <div className="page-head">
      <div><div className="page-title">Team overview</div><div className="page-sub">Today · {s.total} replies in queue · <span style={{color:'var(--primary)',fontWeight:600}}>{s.awaiting} new</span></div></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:16}}>
      <Stat label="Awaiting reply" value={s.awaiting} sub="needs a response" accent="var(--primary)"/>
      <Stat label="Interested" value={s.interested} sub="high intent" accent="var(--green)"/>
      <Stat label="SLA met" value={slaPct+'%'} sub="target 90%" accent="var(--amber)"/>
      <Stat label="Meetings" value={s.meetings} sub="booked this week"/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:16,alignItems:'start'}}>
      <div className="card panel-pad">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontWeight:700,fontSize:15,whiteSpace:'nowrap'}}>Workload</span>
          <span className="faint" style={{fontSize:12.5}}>{handlers.length} handlers active</span>
        </div>
        <div style={{display:'grid',gap:14}}>
          {handlers.map(h=>{const L=load(h.id);return <div key={h.id} onClick={()=>onGoInbox&&onGoInbox(h.id)} style={{display:'flex',gap:13,alignItems:'center',cursor:'pointer',padding:'4px 6px',borderRadius:10,transition:'.1s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--surface-2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <Avatar name={h.name} color={h.color} size="md"/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}><span style={{fontWeight:600,fontSize:14,whiteSpace:'nowrap'}}>{h.name}</span><span className="tnum" style={{fontWeight:800,fontSize:18}}>{L.total}</span></div>
              <div className="faint" style={{fontSize:11.5,margin:'2px 0 7px'}}><span style={{color:L.neu?'var(--primary)':'inherit',fontWeight:L.neu?600:400}}>{L.neu} new</span> · {L.interested} interested · {L.meetings} meetings{L.ooo?` · ${L.ooo} OOO`:''}</div>
              <MeterBar value={L.total} max={maxLoad} color={h.color} h={6}/>
            </div>
          </div>;})}
        </div>
      </div>
      <div style={{display:'grid',gap:16}}>
        <div className="card panel-pad">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <span style={{fontWeight:700,fontSize:15,whiteSpace:'nowrap'}}>SLA today</span>
            <span className="tnum" style={{fontWeight:700,color:'var(--amber)'}}>{slaPct}%</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <Donut pct={slaPct} size={92} stroke={10} color="var(--amber)"><div className="tnum" style={{fontWeight:800,fontSize:18}}>{slaPct}%</div></Donut>
            <div style={{flex:1,display:'grid',gap:9}}>
              {[['On time',A.sla.ontime,'var(--green)'],['At risk',A.sla.risk,'var(--amber)'],['Breached',A.sla.breach,'var(--red)']].map(r=><div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:12.5}}>
                <span style={{display:'flex',alignItems:'center',gap:7,whiteSpace:'nowrap'}}><Dot color={r[2]}/>{r[0]}</span>
                <span className="tnum" style={{fontWeight:700}}>{r[1]}</span>
              </div>)}
            </div>
          </div>
        </div>
        <div className="card panel-pad">
          <div style={{fontWeight:700,fontSize:15,marginBottom:13}}>By campaign</div>
          <div style={{display:'grid',gap:11}}>
            {byCamp.map(({c,n})=><div key={c.id} style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{display:'flex',alignItems:'center',gap:7,flex:1,minWidth:0,fontSize:12.5}}><Dot color={c.color}/><span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name.replace(/ —.*$/,'')}</span></span>
              <div style={{width:58}}><MeterBar value={n} max={campMax} color={c.color} h={6}/></div>
              <span className="tnum faint" style={{fontSize:12,width:16,textAlign:'right'}}>{n}</span>
            </div>)}
          </div>
        </div>
      </div>
    </div>
  </div></div>;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
const ACCENTS={
  '#0E6B66':{name:'Teal',strong:'#0A4F4B',ink:'#0B4642',tint:'#E1EFED',tint2:'#EFF6F4'},
  '#2E6B45':{name:'Pine',strong:'#1F4E31',ink:'#1E4A2F',tint:'#E5EFE8',tint2:'#F1F6F2'},
  '#2B2E2A':{name:'Graphite',strong:'#16191A',ink:'#26302A',tint:'#E8E9E4',tint2:'#F2F3EE'},
  '#8A3A3A':{name:'Oxblood',strong:'#6E2C2C',ink:'#6B2B2B',tint:'#F2E3E1',tint2:'#F9F0EE'},
  '#8A6420':{name:'Amber',strong:'#6F4E15',ink:'#684915',tint:'#F1E8D5',tint2:'#F8F3E8'},
};
function applyTheme(accent){
  const a=ACCENTS[accent]||ACCENTS['#0E6B66'];
  const r=document.documentElement.style;
  r.setProperty('--primary',accent);r.setProperty('--primary-strong',a.strong);
  r.setProperty('--primary-ink',a.ink);r.setProperty('--primary-tint',a.tint);
  r.setProperty('--primary-tint-2',a.tint2);
}
function Sidebar({brand,handler,isAdmin,route,setRoute,accessCamps,go,onLogout,accent,setAccent,density,setDensity}){
  const [menu,setMenu]=uS(false);
  const [settingsOpen,setSettingsOpen]=uS(false);
  const nav=isAdmin
    ?[['inbox','Inbox','inbox'],['mine','My replies','user'],['team','Team','users'],['campaigns','Campaigns','campaign'],['admin','Admin panel','shield'],['analytics','Analytics','chart']]
    :[['inbox','Inbox','inbox'],['mine','My replies','user'],['campaigns','Campaigns','campaign']];
  const scopeOpen=handler.scopeOpen,mineN=handler.mineN;
  return <div className="sidebar">
    <div className="sb-brand">
      <BrandMark/><span className="brand-name">{brand}</span>
      {isAdmin&&<span className="badge solid" style={{height:18,fontSize:9.5,marginLeft:'auto'}}>ADMIN</span>}
    </div>
    <div className="sb-scroll">
      <div className="sb-search"><Icon name="search" size={15}/> Search replies…</div>
      {nav.map(([key,label,ic])=><div key={key} className={'nav-item'+(route===key?' active':'')} onClick={()=>setRoute(key)}>
        <Icon name={ic} size={18} className="nav-ic"/>
        <span className="nav-label">{label}</span>
        {key==='inbox'&&<span className="nav-count">{scopeOpen}</span>}
        {key==='mine'&&<span className="nav-count">{mineN}</span>}
        {key==='campaigns'&&<span className="nav-count">{accessCamps.length}</span>}
      </div>)}
      <div className="sb-group-label">Campaigns</div>
      {accessCamps.map(c=><div key={c.id} className="nav-item" onClick={()=>go({route:'inbox',campaign:c.id,title:c.name})}>
        <span className="nav-dot" style={{background:c.color}}/><span className="nav-label">{c.name}</span>
      </div>)}
      {isAdmin&&<>
        <div className="sb-group-label">Handlers</div>
        {Object.values(DB.HANDLERS).filter(h=>h.role==='handler').map(h=><div key={h.id} className="nav-item" onClick={()=>go({route:'inbox',assignee:h.id,title:h.name+' · replies'})}>
          <Avatar name={h.name} color={h.color} size="xs"/><span className="nav-label" style={{marginLeft:2}}>{h.name}</span>
        </div>)}
      </>}
    </div>
    <div className="sb-foot">
      <Avatar name={handler.name} color={handler.color} size="md"/>
      <div className="uf"><div className="uf-name">{handler.name}</div><div className="uf-role">{isAdmin?'Admin':handler.org}</div></div>
      <div style={{position:'relative'}}>
        <button className="icon-btn" onClick={e=>{e.stopPropagation();setMenu(m=>!m)}}><Icon name="more" size={18}/></button>
        <Popover open={menu} onClose={()=>setMenu(false)} style={{bottom:38,right:0,minWidth:170}}>
          <div style={{padding:'7px 10px 4px'}}><div style={{fontWeight:600,fontSize:13}}>{handler.name}</div><div className="mono faint" style={{fontSize:11}}>{handler.email}</div></div>
          <hr className="divider" style={{margin:'5px 6px'}}/>
          <MenuItem onClick={()=>{setMenu(false);setSettingsOpen(true)}}><Icon name="more" size={16}/> Preferences</MenuItem>
          <MenuItem onClick={onLogout}><Icon name="logout" size={16}/> Sign out</MenuItem>
        </Popover>
      </div>
    </div>
    {settingsOpen&&<div style={{position:'fixed',inset:0,zIndex:100,background:'rgba(26,28,24,.4)',backdropFilter:'blur(2px)',display:'grid',placeItems:'center'}} onClick={()=>setSettingsOpen(false)}>
      <div className="card" style={{width:320,padding:'20px 22px',boxShadow:'var(--sh-pop)'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <span className="serif" style={{fontWeight:600,fontSize:17}}>Preferences</span>
          <button className="icon-btn" onClick={()=>setSettingsOpen(false)}><Icon name="x" size={16}/></button>
        </div>
        <div className="kicker" style={{marginBottom:10}}>Accent color</div>
        <div style={{display:'flex',gap:8,marginBottom:18}}>
          {Object.entries(ACCENTS).map(([hex,a])=><button key={hex} onClick={()=>setAccent(hex)} style={{width:32,height:32,borderRadius:'50%',background:hex,border:accent===hex?`3px solid var(--ink)`:'3px solid transparent',transition:'.12s'}} title={a.name}/>)}
        </div>
        <div className="kicker" style={{marginBottom:10}}>Density</div>
        <Seg options={['compact','regular','comfy']} value={density} onChange={setDensity}/>
        <button className="btn primary block" style={{marginTop:20}} onClick={()=>setSettingsOpen(false)}>Done</button>
      </div>
    </div>}
  </div>;
}

</script>
<script type="text/babel">
/* ============================================================
   APP ROOT
   ============================================================ */
function App(){
  const [session,setSession]=uS(null);
  const [route,setRoute]=uS('inbox');
  const [filter,setFilter]=uS(null);
  const [threads,setThreads]=uS(()=>THREADS_INIT.map(x=>({...x,messages:x.messages.slice()})));
  const [campaigns,setCampaigns]=uS(()=>JSON.parse(JSON.stringify(DB.CAMPAIGNS)));
  const [accent,setAccent]=uS('#0E6B66');
  const [density,setDensity]=uS('regular');

  uE(()=>applyTheme(accent),[accent]);
  uE(()=>{document.body.classList.remove('compact','comfy');if(density==='compact')document.body.classList.add('compact');if(density==='comfy')document.body.classList.add('comfy');},[density]);

  const handler=session?DB.HANDLERS[session]:null;
  const isAdmin=handler&&handler.role==='admin';

  const accessCamps=uM(()=>{
    if(!handler)return [];
    const all=Object.values(campaigns);
    if(isAdmin)return all;
    return all.filter(c=>c.handlers.includes(session)||c.owner===session);
  },[campaigns,session]);

  const scoped=uM(()=>{
    if(!handler)return [];
    if(isAdmin)return threads;
    const ids=new Set(accessCamps.map(c=>c.id));
    return threads.filter(x=>ids.has(x.campaign));
  },[threads,accessCamps,session]);

  function onUpdate(id,patch){setThreads(ts=>ts.map(x=>x.id===id?{...x,...patch}:x));}
  function onSetOwner(cid,hid){setCampaigns(cs=>({...cs,[cid]:{...cs[cid],owner:hid,handlers:hid&&!cs[cid].handlers.includes(hid)?[...cs[cid].handlers,hid]:cs[cid].handlers}}));}
  function onSetHandlers(cid,arr){setCampaigns(cs=>({...cs,[cid]:{...cs[cid],handlers:arr,owner:cs[cid].owner&&arr.includes(cs[cid].owner)?cs[cid].owner:(arr[0]||null)}}));}
  function go(o){setRoute(o.route||'inbox');setFilter(o);}
  function setRouteClean(r){setRoute(r);setFilter(null);}

  if(!session)return <LoginScreen brand="Replyloop" onLogin={id=>{setSession(id);setRoute('inbox');setFilter(null);}}/>;
  DB.CAMPAIGNS=campaigns;

  let viewThreads=scoped,title=null;
  if(route==='mine'){viewThreads=scoped.filter(x=>x.assignee===session);title='My replies';}
  if(route==='inbox'&&filter){if(filter.assignee){viewThreads=scoped.filter(x=>x.assignee===filter.assignee);}title=filter.title;}
  const navHandler={...handler,scopeOpen:scoped.filter(x=>!x.done).length,mineN:scoped.filter(x=>x.assignee===session&&x.unread&&!x.done).length};

  return <div className="app">
    <Sidebar brand="Replyloop" handler={navHandler} isAdmin={isAdmin} route={route}
      setRoute={setRouteClean} accessCamps={accessCamps} go={go} onLogout={()=>setSession(null)}
      accent={accent} setAccent={setAccent} density={density} setDensity={setDensity}/>
    <div className="main">
      {(route==='inbox'||route==='mine')&&
        <InboxScreen key={(route)+'-'+(filter&&(filter.campaign||filter.assignee||filter.title)||'')}
          threads={viewThreads} handler={handler} isAdmin={isAdmin} onUpdate={onUpdate}
          filter={{...(filter||{}),title}}/>}
      {route==='campaigns'&&<CampaignsScreen campaigns={campaigns} threads={scoped} isAdmin={isAdmin} onSetOwner={onSetOwner} onOpenInbox={cid=>go({route:'inbox',campaign:cid,title:campaigns[cid].name})}/>}
      {route==='admin'&&isAdmin&&<AdminScreen campaigns={campaigns} threads={threads} onSetHandlers={onSetHandlers} onSetOwner={onSetOwner}/>}
      {route==='analytics'&&isAdmin&&<AnalyticsScreen threads={threads}/>}
      {route==='team'&&isAdmin&&<TeamScreen threads={threads} onGoInbox={hid=>go({route:'inbox',assignee:hid,title:DB.HANDLERS[hid].name+' · replies'})}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
